name: Node.js CI
on:
  push:
  pull_request:
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
  eslint:
    runs-on: ubuntu-latest
    needs:
      - install
    steps:
      - run: pnpm lint
  prettier:
    runs-on: ubuntu-latest
    needs:
      - install
    steps:
      - run: pnpm exec prettier . --check
  test:
    runs-on: ubuntu-latest
    needs:
      - install
    steps:
      - run: pnpm test
  build:
    runs-on: ubuntu-latest
    needs:
      - install
    steps:
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          path: dist/
